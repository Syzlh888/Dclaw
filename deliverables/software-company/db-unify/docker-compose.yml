version: '3.8'

services:
  db-unify:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: db-unify
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # 持久化数据目录（连接信息、执行历史等）
      - db-unify-data:/app/data
      # 持久化日志
      - db-unify-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # 可选：Nginx 反向代理（生产环境推荐配置 SSL 证书）
  nginx:
    image: nginx:alpine
    container_name: db-unify-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./ssl:/etc/nginx/ssl:ro  # SSL 证书目录
    depends_on:
      - db-unify

volumes:
  db-unify-data:
  db-unify-logs:
